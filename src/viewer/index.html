<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kou-tty viewer</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0e1116; color: #c9d1d9; }
  header { padding: 12px 16px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  main { display: flex; height: calc(100vh - 49px); }
  #list { width: 220px; border-right: 1px solid #21262d; overflow-y: auto; }
  #list .item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #161b22; }
  #list .item:hover { background: #161b22; }
  #list .item.active { background: #1f6feb22; color: #58a6ff; }
  #screen { flex: 1; padding: 14px; overflow: auto; white-space: pre; }
  .state { font-size: 11px; color: #6e7681; }
  .running { color: #56d364; }
  .idle { color: #d29922; }
  .waiting_for_input { color: #58a6ff; }
  .exited { color: #f85149; }
</style>
</head>
<body>
<header>
  <h1>kou-tty viewer</h1>
  <span id="status">connecting…</span>
</header>
<main>
  <div id="list"></div>
  <pre id="screen">Select a terminal</pre>
</main>
<script>
const listEl = document.getElementById('list');
const screenEl = document.getElementById('screen');
const statusEl = document.getElementById('status');
let activeId = null;
let socket = null;

async function refreshList() {
  try {
    const r = await fetch('/api/terminals');
    const data = await r.json();
    listEl.innerHTML = '';
    for (const t of data.terminals) {
      const div = document.createElement('div');
      div.className = 'item' + (t.id === activeId ? ' active' : '');
      div.innerHTML = `<div><b>${t.id}</b> <span class="state ${t.process_state}">${t.process_state}</span></div>
        <div class="state">${t.cols}×${t.rows}</div>`;
      div.onclick = () => attach(t.id);
      listEl.appendChild(div);
    }
    statusEl.textContent = `${data.terminals.length} terminal(s)`;
  } catch (e) {
    statusEl.textContent = 'disconnected';
  }
}

function attach(id) {
  if (socket) socket.close();
  activeId = id;
  refreshList();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  socket = new WebSocket(`${proto}//${location.host}/ws/terminals/${id}`);
  socket.onmessage = (e) => {
    const payload = JSON.parse(e.data);
    if (payload.error) { screenEl.textContent = `(${payload.error})`; return; }
    screenEl.textContent = payload.text;
  };
  socket.onclose = () => statusEl.textContent = 'socket closed';
}

refreshList();
setInterval(refreshList, 3000);
</script>
</body>
</html>
